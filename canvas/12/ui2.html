<html>
    <head>
    </head>
    <body>
        <canvas id="lienzo" width="300px" height="300px"></canvas>
        <script>
            var canvas = document.getElementById("lienzo");
            var anchura = canvas.width;
            var altura = canvas.height;

            // Original size reference
            var originalSize = 300;
            var scaleFactor = Math.min(anchura, altura) / originalSize;

            class Circulo {
                constructor() {
                    this.t = Math.round(Math.random() * 3);
                    this.r = 0;
                    this.a1 = Math.random() * Math.PI * 2;
                    this.a2 = this.a1 + Math.random() * Math.PI * 2;
                    this.da1 = 0;
                    this.da2 = 0;
                    this.v = (Math.random() - 0.5);
                    this.d = 0;
                }
            }

            var tiempo = 0;
            var contexto = canvas.getContext("2d");
            contexto.fillStyle = "rgba(0,0,0,0.1)";
            var temporizador = setTimeout("bucle()", 1000);

            var circulos = new Array();
            var numerocirculos = 20;
            var anchuracirculo = 5 * scaleFactor;
            contexto.lineWidth = anchuracirculo + 0.2;
            contexto.strokeStyle = "rgba(0,0,0,0.3)";

            for (var i = 0; i < numerocirculos; i++) {
                circulos[i] = new Circulo();
                circulos[i].r = i * anchuracirculo + 30 * scaleFactor;
            }

            // Epoch time for folder naming
            var epochTime = Math.floor(Date.now() / 1000);

            function bucle() {
                contexto.clearRect(0, 0, anchura, altura);
                for (var i = 0; i < numerocirculos; i++) {
                    circulos[i].v += (Math.random() - 0.5) * 0.001;
                    circulos[i].a1 += Math.cos(tiempo * 0.01) * 0.001 + Math.sin(circulos[i].v) * 0.01;
                    circulos[i].a2 += Math.sin(tiempo * 0.01) * 0.001 + Math.sin(circulos[i].v) * 0.01;

                    switch (circulos[i].t) {
                        case 0:
                            contexto.beginPath();
                            contexto.arc(anchura / 2, altura / 2, circulos[i].r, circulos[i].a1, circulos[i].a2, false);
                            contexto.stroke();
                            contexto.closePath();
                            break;
                        case 1:
                            var innerRadius = circulos[i].r - anchuracirculo - 10 * scaleFactor;
                            contexto.beginPath();
                            contexto.moveTo(anchura / 2 + Math.cos(circulos[i].a1) * innerRadius, altura / 2 + Math.sin(circulos[i].a1) * innerRadius);
                            contexto.arc(anchura / 2, altura / 2, circulos[i].r, circulos[i].a1, circulos[i].a2, false);
                            contexto.lineTo(anchura / 2 + Math.cos(circulos[i].a2) * innerRadius, altura / 2 + Math.sin(circulos[i].a2) * innerRadius);
                            contexto.arc(anchura / 2, altura / 2, innerRadius, circulos[i].a2, circulos[i].a1, true);
                            contexto.closePath();
                            contexto.fill();
                            break;
                        case 2:
                            for (var j = circulos[i].a1; j < circulos[i].a2; j += 0.05) {
                                contexto.beginPath();
                                contexto.arc(anchura / 2, altura / 2, circulos[i].r, j, j + 0.02, false);
                                contexto.stroke();
                                contexto.closePath();
                            }
                            contexto.lineWidth = anchuracirculo + 10 * scaleFactor;
                            contexto.beginPath();
                            contexto.arc(anchura / 2, altura / 2, circulos[i].r, circulos[i].a1, circulos[i].a1 + 0.02, false);
                            contexto.stroke();
                            contexto.closePath();
                            contexto.beginPath();
                            contexto.arc(anchura / 2, altura / 2, circulos[i].r, circulos[i].a2, circulos[i].a2 + 0.02, false);
                            contexto.stroke();
                            contexto.closePath();
                            contexto.lineWidth = anchuracirculo + 0.2;
                            break;
                        case 3:
                            contexto.lineWidth = 1;
                            contexto.beginPath();
                            contexto.arc(anchura / 2, altura / 2, circulos[i].r, circulos[i].a1, circulos[i].a2, false);
                            contexto.stroke();
                            contexto.closePath();
                            contexto.lineWidth = anchuracirculo + 0.2;

                            contexto.beginPath();
                            contexto.arc(anchura / 2 + Math.cos(circulos[i].a1) * circulos[i].r, altura / 2 + Math.sin(circulos[i].a1) * circulos[i].r, 3 * scaleFactor, 0, Math.PI * 2, true);
                            contexto.fill();
                            contexto.closePath();

                            contexto.beginPath();
                            contexto.arc(anchura / 2 + Math.cos(circulos[i].a2) * circulos[i].r, altura / 2 + Math.sin(circulos[i].a2) * circulos[i].r, 3 * scaleFactor, 0, Math.PI * 2, true);
                            contexto.fill();
                            contexto.closePath();
                            break;
                    }
                }
                // Send the frame to the server
                sendFrameToServer(canvas, epochTime, tiempo);

                tiempo++;
                clearTimeout(temporizador);
                temporizador = setTimeout("bucle()", 100);
            }

            function sendFrameToServer(canvas, epochTime, frameNumber) {
                canvas.toBlob(function(blob) {
                    var formData = new FormData();
                    formData.append('frame', blob, 'frame.png');
                    formData.append('epochTime', epochTime);
                    formData.append('frameNumber', frameNumber);

                    fetch('save_frame.php', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.text())
                    .then(data => {
                        console.log(data);
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
                }, 'image/png');
            }
        </script>
    </body>
</html>
